{% extends 'base.html' %}
{% block title %}Delete Portfolio — KappaQuant{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle fs-1 text-danger mb-3"></i>
                <h4>Delete "{{ portfolio.name }}"?</h4>
                <p class="text-muted">This will permanently delete the portfolio and all its holdings. This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'portfolio:detail' pk=portfolio.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
